name: Bug report
description: Report incorrect API behavior, test failures, or setup problems
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include steps to reproduce and expected vs actual behavior.
        **Do not** include real credentials or production URLs.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
      placeholder: POST /api/v1/bookings returns 500 when ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: HTTP 409 with BookingConflictException
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. cp .env.example .env && php artisan migrate --seed
        2. Login as user@example.com
        3. POST /api/v1/bookings with ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: PHP / Laravel version
      placeholder: PHP 8.3, Laravel 13
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: How are you running the app?
      options:
        - Docker Compose
        - Native PHP (artisan serve)
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or response body
      render: shell
      placeholder: Paste sanitized stack trace or JSON response (no secrets).
