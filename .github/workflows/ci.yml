name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: booking-api-showcase-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  laravel:
    name: Laravel — Pint & PHPUnit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, intl, pcntl, bcmath, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
          php artisan jwt:secret --force

      - name: Laravel Pint (code style)
        run: vendor/bin/pint --test

      - name: Run PHPUnit
        run: php artisan test

      - name: Generate OpenAPI spec
        run: php artisan l5-swagger:generate

  docker:
    name: Docker — production image build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build --build-arg INSTALL_DEV=false -t booking-api-showcase:ci .
